<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root">
    <div class="clock-row">

      <!-- Left card (hours / timer minutes) -->
      <div class="flip-card" id="fc-left">
        <div class="card-upper" id="upper-left"><span class="card-num" id="upper-left-num">12</span></div>
        <div class="card-lower" id="lower-left"><span class="card-num" id="lower-left-num">12</span></div>
        <div class="flip-line"></div>
        <span class="ampm-badge" id="ampm-label">AM</span>
      </div>

      <!-- Colon dots -->
      <div class="colon-wrap">
        <div class="colon-dot" id="dot1"></div>
        <div class="colon-dot" id="dot2"></div>
      </div>

      <!-- Right card (minutes / timer seconds) -->
      <div class="flip-card" id="fc-right">
        <div class="card-upper" id="upper-right"><span class="card-num" id="upper-right-num">00</span></div>
        <div class="card-lower" id="lower-right"><span class="card-num" id="lower-right-num">00</span></div>
        <div class="flip-line"></div>
      </div>

    </div>

    <!-- TIME / TIMER toggle -->
    <div class="toggle-row">
      <span class="toggle-label active" id="label-time" onclick="setMode('clock')">Time</span>
      <div class="toggle-track" id="toggle-track" onclick="toggleMode()">
        <div class="toggle-thumb"></div>
      </div>
      <span class="toggle-label" id="label-timer" onclick="setMode('timer')">Timer</span>
    </div>

    <!-- Timer controls (hidden in clock mode) -->
    <div class="timer-panel" id="timer-panel">
      <div class="duration-row" id="duration-row">
        <span class="duration-label">min</span>
        <input class="duration-input" type="number" id="duration-input" value="5" min="1" max="99" />
      </div>
      <div class="timer-controls">
        <div class="side-btn-wrap" id="wrap-minus">
          <button class="ctrl-btn" onclick="adjustTimer(-60)">−</button>
        </div>
        <button class="start-btn" id="start-btn" onclick="toggleTimer()">▶</button>
        <div class="side-btn-wrap" id="wrap-plus">
          <button class="ctrl-btn" onclick="adjustTimer(60)">+</button>
        </div>
        <div class="side-btn-wrap hidden" id="wrap-reset">
          <button class="ctrl-btn reset-btn" onclick="resetTimer()">↺</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
